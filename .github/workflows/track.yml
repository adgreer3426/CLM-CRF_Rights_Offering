name: Track Rights Offerings

on:
  schedule:
    - cron: "0 * * * *"  # every hour on the hour
  workflow_dispatch:      # allows manual run from GitHub UI

permissions:
  contents: write  # needed to commit state file back to repo

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER: ${{ secrets.TWILIO_TO_NUMBER }}
          EDGAR_AGENT: ${{ secrets.EDGAR_AGENT }}
        run: python tracker.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_filings.json
          git diff --staged --quiet || git commit -m "chore: update seen filings state [skip ci]"
          git push
